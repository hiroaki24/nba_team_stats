name: Run NBA Team Stats

on:
  workflow_dispatch:
    inputs:
      team_abbr:
        description: 'Team abbreviation (e.g. BOS)'
        required: true
        default: 'BOS'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run script
        run: echo "${{ github.event.inputs.team_abbr }}" | python nba_team_stats.py

      - name: Upload xlsx
        uses: actions/upload-artifact@v4
        with:
          name: nba-team-stats
          path: "*.xlsx"
